# New-API Dokploy Compose（测试环境：腾讯云 2 核 4G）
#
# 适用测试环境配置：
# - 云厂商：腾讯云
# - CPU：2 核
# - 内存：4 GB
# - 用途：测试环境、域名接入、功能验证、后台配置、联调测试
# - 当前测试环境公网 IP：43.156.68.154
#
# 说明：
# - 仅建议单实例部署
# - 不建议直接承接正式高并发流量
# - 默认值按“文本请求为主、无图片/音频/视频”场景收紧

services:
  new-api:
    image: calciumion/new-api:latest
    restart: always
    command: --log-dir /app/logs
    environment:
      - SQL_DSN=postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-new-api}
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@${REDIS_HOST:-redis}:6379
      - TZ=${TZ:-Asia/Shanghai}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-false}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}
      - SESSION_SECRET=${SESSION_SECRET}
      - CRYPTO_SECRET=${CRYPTO_SECRET}
      - MEMORY_CACHE_ENABLED=${MEMORY_CACHE_ENABLED:-true}
      - SYNC_FREQUENCY=${SYNC_FREQUENCY:-60}
      - NODE_TYPE=${NODE_TYPE:-master}
      - NODE_NAME=${NODE_NAME:-new-api-test}
      - SQL_MAX_OPEN_CONNS=${SQL_MAX_OPEN_CONNS:-20}
      - SQL_MAX_IDLE_CONNS=${SQL_MAX_IDLE_CONNS:-8}
      - SQL_MAX_LIFETIME=${SQL_MAX_LIFETIME:-300}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-20}
      - RELAY_MAX_IDLE_CONNS=${RELAY_MAX_IDLE_CONNS:-100}
      - RELAY_MAX_IDLE_CONNS_PER_HOST=${RELAY_MAX_IDLE_CONNS_PER_HOST:-50}
      - STREAMING_TIMEOUT=${STREAMING_TIMEOUT:-180}
      - MAX_REQUEST_BODY_MB=${MAX_REQUEST_BODY_MB:-4}
      - MAX_FILE_DOWNLOAD_MB=${MAX_FILE_DOWNLOAD_MB:-4}
      - UPDATE_TASK=${UPDATE_TASK:-false}
      - CountToken=${CountToken:-false}
      - TRUSTED_REDIRECT_DOMAINS=${TRUSTED_REDIRECT_DOMAINS:-idtoken.ai}
    volumes:
      - new-api-data:/data
      - new-api-logs:/app/logs
    depends_on:
      - redis
      - postgres
    networks:
      - dokploy-network
      - new-api-network
    expose:
      - "3000"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - new-api-network
    volumes:
      - redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-new-api}
    networks:
      - new-api-network
    volumes:
      - pg-data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  new-api-data:
  new-api-logs:
  redis-data:
  pg-data:

networks:
  new-api-network:
    driver: bridge
  dokploy-network:
    external: true
