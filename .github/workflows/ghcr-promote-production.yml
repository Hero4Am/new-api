name: Promote GHCR image (production)

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "测试镜像标签，例如 sha-abc1234"
        required: true
        type: string
      release_tag:
        description: "正式版本标签，例如 v2026.04.23-1"
        required: true
        type: string
      update_production_tag:
        description: "是否同时更新 production 标签"
        required: true
        default: true
        type: boolean

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 规范化镜像名
        run: echo "GHCR_IMAGE=${GITHUB_REPOSITORY,,}-private" >> "$GITHUB_ENV"

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 校验源镜像存在
        run: docker buildx imagetools inspect ghcr.io/${GHCR_IMAGE}:${{ inputs.source_tag }}

      - name: 提升为正式版本
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_IMAGE}:${{ inputs.release_tag }} \
            ghcr.io/${GHCR_IMAGE}:${{ inputs.source_tag }}

      - name: 更新 production 标签
        if: ${{ inputs.update_production_tag }}
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_IMAGE}:production \
            ghcr.io/${GHCR_IMAGE}:${{ inputs.source_tag }}

      - name: 输出镜像信息
        run: |
          echo "### GHCR 正式镜像" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 来源：ghcr.io/${GHCR_IMAGE}:${{ inputs.source_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 正式：ghcr.io/${GHCR_IMAGE}:${{ inputs.release_tag }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.update_production_tag }}" = "true" ]; then
            echo "- 别名：ghcr.io/${GHCR_IMAGE}:production" >> "$GITHUB_STEP_SUMMARY"
          fi
