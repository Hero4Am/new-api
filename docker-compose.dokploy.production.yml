# New-API Dokploy Compose（正式环境：4 核 8G）
#
# 适用机器配置：
# - CPU：4 核
# - 内存：8 GB
# - 用途：正式文本请求环境起步配置
#
# 说明：
# - 适合文本请求为主、未来需扩容的正式环境
# - 推荐后续将 PostgreSQL / Redis 拆分为独立服务
# - 默认值按“4 核 8G、单实例起步”设置
# - 域名和 HTTPS 统一在 Dokploy 的 Domains 页面管理

services:
  new-api:
    image: calciumion/new-api:latest
    restart: always
    command: --log-dir /app/logs
    environment:
      - SQL_DSN=postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-new-api}
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@${REDIS_HOST:-redis}:6379
      - TZ=${TZ:-Asia/Shanghai}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-false}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}
      - SESSION_SECRET=${SESSION_SECRET}
      - CRYPTO_SECRET=${CRYPTO_SECRET}
      - MEMORY_CACHE_ENABLED=${MEMORY_CACHE_ENABLED:-true}
      - SYNC_FREQUENCY=${SYNC_FREQUENCY:-30}
      - NODE_TYPE=${NODE_TYPE:-master}
      - NODE_NAME=${NODE_NAME:-new-api-1}
      - SQL_MAX_OPEN_CONNS=${SQL_MAX_OPEN_CONNS:-60}
      - SQL_MAX_IDLE_CONNS=${SQL_MAX_IDLE_CONNS:-20}
      - SQL_MAX_LIFETIME=${SQL_MAX_LIFETIME:-300}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-50}
      - RELAY_MAX_IDLE_CONNS=${RELAY_MAX_IDLE_CONNS:-500}
      - RELAY_MAX_IDLE_CONNS_PER_HOST=${RELAY_MAX_IDLE_CONNS_PER_HOST:-150}
      - STREAMING_TIMEOUT=${STREAMING_TIMEOUT:-180}
      - MAX_REQUEST_BODY_MB=${MAX_REQUEST_BODY_MB:-8}
      - MAX_FILE_DOWNLOAD_MB=${MAX_FILE_DOWNLOAD_MB:-8}
      - UPDATE_TASK=${UPDATE_TASK:-false}
      - CountToken=${CountToken:-false}
      - TRUSTED_REDIRECT_DOMAINS=${TRUSTED_REDIRECT_DOMAINS:-idtoken.ai}
    volumes:
      - new-api-data:/data
      - new-api-logs:/app/logs
    depends_on:
      - redis
      - postgres
    networks:
      - dokploy-network
      - new-api-network
    expose:
      - "3000"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - new-api-network
    volumes:
      - redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-new-api}
    networks:
      - new-api-network
    volumes:
      - pg-data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  new-api-data:
  new-api-logs:
  redis-data:
  pg-data:

networks:
  new-api-network:
    driver: bridge
  dokploy-network:
    external: true
